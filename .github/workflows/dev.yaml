name: Finale Dev CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run backend unit tests
        working-directory: backend
        run: uv sync --group dev && uv run --group dev pytest tests/ -q

      - name: Terraform plan or apply
        uses: ./.github/actions/build
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.MAIN_AWS_DEPLOY_DEV_ARN }}
          terraform-apply: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tf-var-openai-api-key: ${{ secrets.TF_VAR_openai_api_key }}
          tf-var-next-public-api-url: ${{ secrets.TF_VAR_next_public_api_url }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Clone the repository
        uses: actions/checkout@v4

      - name: Push image to ECR (finale-app-ecr)
        uses: ./.github/actions/deploy
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.MAIN_AWS_DEPLOY_DEV_ARN }}
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          next-public-api-url: ${{ secrets.NEXT_PUBLIC_API_URL }}
