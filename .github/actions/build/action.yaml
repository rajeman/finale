name: Build
description: Terraform init; plan on PR, apply on main when terraform-apply is true.

inputs:
  aws-access-key-id:
    description: AWS access key ID used before assuming the deploy role.
    required: true
  aws-secret-access-key:
    description: AWS secret access key.
    required: true
  aws-region:
    description: AWS region (Terraform backend and provider).
    required: true
  role-to-assume:
    description: IAM role ARN to assume (needs Terraform state + apply permissions on main).
    required: true
  terraform-apply:
    description: When the string 'true', run terraform apply -auto-approve after init (e.g. push to main).
    required: true
  tf-var-openai-api-key:
    description: TF_VAR_openai_api_key
    required: true
  tf-var-next-public-api-url:
    description: TF_VAR_next_public_api_url (optional; can be empty for same-origin)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-to-assume }}
        role-duration-seconds: 3600

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.9.0"

    - name: Terraform init and plan or apply
      shell: bash
      working-directory: terraform
      env:
        TF_VAR_openai_api_key: ${{ inputs.tf-var-openai-api-key }}
        TF_VAR_next_public_api_url: ${{ inputs.tf-var-next-public-api-url }}
      run: |
        set -euo pipefail
        terraform init -input=false
        if [ "${{ inputs.terraform-apply }}" = "true" ]; then
          terraform apply -auto-approve -input=false
        else
          terraform plan -input=false
        fi
        terraform output
